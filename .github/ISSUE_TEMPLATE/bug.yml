name: Skill or repository bug
description: Report incorrect behavior, broken evaluation, or documentation drift.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Include the skill revision, harness, and sanitized evidence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Do not include credentials, private prompts, or customer data.
    validations:
      required: true

