known_limits:
  - Deep inspection quality depends on the host runtime and subagent support.
  - Deterministic structure scoring certifies required-document presence only; semantic Ruler-1 quality remains an unscored deep-inspection judgment.
  - Apply mode requires Python, Git, a valid prior report, a clean worktree, and a feature branch; an explicit YAML config additionally requires PyYAML.
  - Multi-file apply is not a filesystem-wide transaction; each path uses atomic replacement, and a later failure triggers tested preimage rollback with an explicit verification receipt.
  - Multica Workspace import has not been smoke-tested from the released public URL.
  - Platform-specific permission enforcement varies by runtime.

